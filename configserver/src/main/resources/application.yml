spring:
  application:
    name: configserver
  cloud:
    config:
      server:
        default-repository-type: git
        git:
          uri: https://github.com/RahulNarsagouni05/BankConfig.git
          default-label: main
          clone-on-start: true
          username: ${GIT_USERNAME}
          password: ${GIT_PASSWORD}

server:
  port: 8071

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"